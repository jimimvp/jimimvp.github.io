---
layout: default
full_bleed: true
---

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ site.name }}",
  "url": "{{ site.url }}",
  "image": "{{ site.url }}/images/profile.jpg",
  "jobTitle": "Member of Technical Staff",
  "worksFor": {
    "@type": "Organization",
    "name": "Project Prometheus"
  },
  "alumniOf": [
    { "@type": "Organization", "name": "Max Planck Institute for Intelligent Systems" },
    { "@type": "Organization", "name": "ETH Zurich" },
    { "@type": "Organization", "name": "Karlsruhe Institute of Technology" }
  ],
  "sameAs": [
    "https://scholar.google.com/citations?user=bmOnRUcAAAAJ",
    "https://github.com/jimimvp",
    "https://www.linkedin.com/in/mvlastelica/",
    "https://x.com/vlastelicap",
    "https://www.instagram.com/marin.vlast"
  ]
}
</script>

<main class="page page--wide home">
  <section class="hero">
    <div class="hero__intro">
      <img
        class="hero__photo"
        src="{{ '/images/profile.jpg' | relative_url }}"
        alt="Portrait of {{ site.name }}"
        width="280"
        height="280"
        loading="eager"
        decoding="async">
      <h1 class="hero__name">{{ site.name }}</h1>
      {% include summary.html %}
    </div>
  </section>

  {% include news.html %}

  {% include posts.html %}
</main>
