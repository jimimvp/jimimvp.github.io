- title: "The Book of Why"
  author: Judea Pearl
  description: "Pearl's case for causal reasoning over statistics. Compelling examples, but more manifesto than textbook."
  image: https://m.media-amazon.com/images/I/41V1dRBVJJL._SY445_SX342_.jpg
  link: "https://amzn.to/3L8qV7H"

