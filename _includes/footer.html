<footer class="site-footer">
  <div class="site-footer__inner">
    <ul class="social" aria-label="Social and academic profiles">
      {% for sm in site.data.social_media %}
        <li>
          <a href="{{ sm.link }}" aria-label="{{ sm.name | default: 'External profile' }}" target="_blank" rel="noopener noreferrer">
            <i class="{{ sm.favicon }}" aria-hidden="true"></i>
          </a>
        </li>
      {% endfor %}
    </ul>
    <p class="site-footer__copy">
      &copy; {{ 'now' | date: "%Y" }} <a href="{{ '/' | relative_url }}">{{ site.name }}</a>
    </p>
  </div>
</footer>
