- title: "Zero to One"
  author: Peter Thiel
  description: "What makes a startup actually succeed? Short, opinionated, and worth the few hours."
  image: https://m.media-amazon.com/images/I/41puYDYvYxL._SY445_SX342_.jpg
  link: "https://www.amazon.de/dp/0804139296?tag=mvlast-21"

- title: "The Hard Thing About Hard Things"
  author: "Ben Horowitz"
  description: "Horowitz on the unglamorous side of being a CEO. Honest about the leadership problems nobody warns you about."
  image: https://m.media-amazon.com/images/I/51Ifl2MgiKL._SY445_SX342_.jpg
