---
layout: default
full_bleed: true
---
<!-- LaTeX macros are defined centrally in _includes/mathjax.html -->

<article class="page page--post">
  <header>
    <h1>{{ page.title }}</h1>
    {% if page.date %}
      <p class="blog-entry__date">{{ page.date | date: "%d %B %Y" }}</p>
    {% endif %}
  </header>

  {{ content }}
</article>
