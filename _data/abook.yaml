  image: https://m.media-amazon.com/images/I/51JsPVH6VxL._SY445_SX342_.jpg
  link: "https://www.amazon.de/dp/1250118360?tag=mvlast-21"

- title: "How to Change Your Mind"
  author: "Michael Pollan"
  description: "A rigorous and personal look at psychedelic research — part neuroscience, part history, part memoir."
